name: Daily MySQL Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  backup-and-restore:
    runs-on: ubuntu-latest
    steps:
      - name: Install MySQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Dump and Sync
        env:
          S_HOST: ${{ secrets.SOURCE_HOST }}
          S_PORT: ${{ secrets.SOURCE_PORT }}
          S_USER: ${{ secrets.SOURCE_USER }}
          S_PASS: ${{ secrets.SOURCE_PASS }}
          S_DB: ${{ secrets.SOURCE_DB }}
          # If you don't have a second DB yet, we will just 'test' the dump first
          T_HOST: ${{ secrets.TARGET_HOST }}
          T_USER: ${{ secrets.TARGET_USER }}
          T_PASS: ${{ secrets.TARGET_PASS }}
          T_DB: ${{ secrets.TARGET_DB }}
        run: |
          # 1. Export from Aiven Primary
          # We use --column-statistics=0 for compatibility
          mysqldump -h "$S_HOST" -P "$S_PORT" -u "$S_USER" -p"$S_PASS" \
            --column-statistics=0 \
            --set-gtid-purged=OFF \
            --databases "$S_DB" > backup.sql
          
          echo "Backup successful! File 'backup.sql' created."

          # 2. Import into Secondary DB (Optional: only if TARGET secrets are set)
          if [ ! -z "$T_HOST" ]; then
            mysql -h "$T_HOST" -u "$T_USER" -p"$T_PASS" "$T_DB" < backup.sql
            echo "Sync to Target DB successful!"
          else
            echo "No Target DB defined, skipping sync."
          fi