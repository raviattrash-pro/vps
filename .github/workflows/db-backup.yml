name: Aiven to TiDB Cloud Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  backup-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Install MySQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: 1. Dump from Aiven
        env:
          S_HOST: ${{ secrets.SOURCE_HOST }}
          S_PORT: ${{ secrets.SOURCE_PORT }}
          S_USER: ${{ secrets.SOURCE_USER }}
          S_PASS: ${{ secrets.SOURCE_PASS }}
          S_DB: ${{ secrets.SOURCE_DB }}
        run: |
          # Use --column-statistics=0 for compatibility between different MySQL versions
          mysqldump -h "$S_HOST" -P "$S_PORT" -u "$S_USER" -p"$S_PASS" \
            --column-statistics=0 \
            --set-gtid-purged=OFF \
            --no-tablespaces \
            --databases "$S_DB" > backup.sql
          echo "Dump from Aiven complete."

      - name: 2. Save Downloadable Artifact (Option 1)
        uses: actions/upload-artifact@v4
        with:
          name: aiven-backup-${{ github.run_id }}
          path: backup.sql
          retention-days: 5

      - name: 3. Sync to TiDB Cloud (Option 2)
        env:
          T_HOST: ${{ secrets.TARGET_HOST }}
          T_PORT: ${{ secrets.TARGET_PORT }}
          T_USER: ${{ secrets.TARGET_USER }}
          T_PASS: ${{ secrets.TARGET_PASS }}
          T_DB: ${{ secrets.TARGET_DB }}
        run: |
          # TiDB Cloud requires SSL by default
          mysql -h "$T_HOST" -P "$T_PORT" -u "$T_USER" -p"$T_PASS" --ssl-mode=REQUIRED "$T_DB" < backup.sql
          echo "Sync to TiDB Cloud complete!"