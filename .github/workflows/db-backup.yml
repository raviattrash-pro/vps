name: Aiven to TiDB Cloud Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: db-backup-sync
  cancel-in-progress: false

jobs:
  backup-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Install MySQL client and zip tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client zip

      - name: Dump SQL from Aiven
        env:
          S_HOST: ${{ secrets.SOURCE_HOST }}
          S_PORT: ${{ secrets.SOURCE_PORT }}
          S_USER: ${{ secrets.SOURCE_USER }}
          S_PASS: ${{ secrets.SOURCE_PASS }}
          S_DB: ${{ secrets.SOURCE_DB }}
        run: |
          mysqldump \
            -h "$S_HOST" \
            -P "$S_PORT" \
            -u "$S_USER" \
            -p"$S_PASS" \
            --single-transaction \
            --quick \
            --column-statistics=0 \
            --set-gtid-purged=OFF \
            --no-tablespaces \
            "$S_DB" > backup.sql

          test -s backup.sql
          gzip -f backup.sql
          echo "SQL dump from Aiven complete."

      - name: Export CSV files from Aiven
        env:
          S_HOST: ${{ secrets.SOURCE_HOST }}
          S_PORT: ${{ secrets.SOURCE_PORT }}
          S_USER: ${{ secrets.SOURCE_USER }}
          S_PASS: ${{ secrets.SOURCE_PASS }}
          S_DB: ${{ secrets.SOURCE_DB }}
        run: |
          mkdir -p csv

          mysql -h "$S_HOST" -P "$S_PORT" -u "$S_USER" -p"$S_PASS" -Nse \
            "SELECT table_name FROM information_schema.tables WHERE table_schema='$S_DB' ORDER BY table_name;" \
            > tables.txt

          while read -r table; do
            [ -n "$table" ] || continue
            echo "Exporting $table to CSV..."

            mysql -h "$S_HOST" -P "$S_PORT" -u "$S_USER" -p"$S_PASS" \
              --batch --raw --silent \
              -e "SELECT * FROM \`$S_DB\`.\`$table\`" \
              | awk 'BEGIN { OFS="," } { gsub(/"/, "\"\"", $0); print }' \
              | sed 's/\t/,/g' > "csv/${table}.csv"
          done < tables.txt

          zip -r backup-csv.zip csv
          echo "CSV export complete."

      - name: Upload SQL backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: aiven-sql-backup-${{ github.run_id }}
          path: backup.sql.gz
          retention-days: 5

      - name: Upload CSV backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: aiven-csv-backup-${{ github.run_id }}
          path: backup-csv.zip
          retention-days: 5

      - name: Sync SQL backup to TiDB Cloud
        env:
          T_HOST: ${{ secrets.TARGET_HOST }}
          T_PORT: ${{ secrets.TARGET_PORT }}
          T_USER: ${{ secrets.TARGET_USER }}
          T_PASS: ${{ secrets.TARGET_PASS }}
          T_DB: ${{ secrets.TARGET_DB }}
        run: |
          gunzip -c backup.sql.gz | mysql \
            -h "$T_HOST" \
            -P "$T_PORT" \
            -u "$T_USER" \
            -p"$T_PASS" \
            --ssl-mode=REQUIRED \
            "$T_DB"

          echo "Sync to TiDB Cloud complete!"
